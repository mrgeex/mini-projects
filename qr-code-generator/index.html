<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>QR-Code Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container flex">
      <div class="preferences flex">
        <input type="color" class="light" value="#fff" />
        <input type="color" class="dark" />
        <select name="size" class="size">
          <option value="100">100x100</option>
          <option value="200">200x200</option>
          <option selected value="300">300x300</option>
          <option value="400">400x400</option>
        </select>
      </div>
      <input
        type="text"
        name="qrcode-value"
        class="qrcode__value"
        placeholder="Enter QR code value/url"
      />
      <div class="qrcode flex">
        <img src="download.svg" />
      </div>
      <div class="buttons flex">
        <a href="#" class="download flex btn">
          <img src="download.svg" width="16" height="16" />
          <span>Download</span>
        </a>
        <button class="share btn flex">
          <img src="share.svg" width="16" height="16" />
          <span>Share</span>
        </button>
      </div>
    </div>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
      integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <!--    <script-->
    <!--      src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.0.3/qrcode.min.js"-->
    <!--      integrity="sha512-CwmiQdOoXBchUa3+Eb5brNU8lxeJr7CVjWDwBCr+2wvbTEGzI982TnvGVQtvPKfvSevelLCV2xa7S/pdLKZKag=="-->
    <!--      crossorigin="anonymous"-->
    <!--      referrerpolicy="no-referrer"-->
    <!--    ></script>-->
    <script src="app.js"></script>
  </body>
</html>
